<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transformer 工作原理 · 动画演示</title>
<style>
  :root{
    --bg:#f5f6fa; --sidebar-bg:#fff; --content-bg:#fff; --border:#e2e6ed;
    --text:#2c3e50; --text-muted:#7f8c9a; --accent:#4f6ef7; --accent-light:#eef1fe;
    --accent-hover:#3a56e0; --heading:#1a2540; --enc:#4f6ef7; --dec:#f5933a;
    --enc-light:#eef1fe; --dec-light:#fdf0e3; --good:#2d6a4f; --good-light:#eaf7f0;
    --callout-bg:#eef1fe; --tag-bg:#e8ecfd; --tag-text:#3a56e0;
    --shadow:0 2px 12px rgba(79,110,247,.07);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
    background:var(--bg);color:var(--text);display:flex;min-height:100vh;font-size:15px;line-height:1.7;
  }

  /* 侧边栏 */
  #sidebar{width:250px;min-width:250px;background:var(--sidebar-bg);border-right:1px solid var(--border);
    position:fixed;top:0;left:0;height:100vh;overflow-y:auto;padding:24px 0 40px;box-shadow:var(--shadow);z-index:100;}
  #sidebar .logo{padding:0 20px 14px;font-size:13px;font-weight:700;letter-spacing:.06em;color:var(--accent);
    border-bottom:1px solid var(--border);margin-bottom:8px;}
  #sidebar .logo small{display:block;color:var(--text-muted);font-weight:600;letter-spacing:0;margin-top:4px;font-size:11px;}
  .nav-step{display:flex;align-items:center;gap:10px;padding:7px 18px;font-size:12.5px;color:var(--text-muted);
    cursor:pointer;border-left:3px solid transparent;transition:.18s;}
  .nav-step:hover{color:var(--accent);background:var(--accent-light);}
  .nav-step.active{color:var(--accent);border-left-color:var(--accent);background:var(--accent-light);font-weight:600;}
  .nav-step.done{color:var(--good);}
  .nav-step .n{width:22px;height:22px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;
    justify-content:center;font-size:11px;font-weight:800;background:var(--accent-light);color:var(--accent);font-variant-numeric:tabular-nums;}
  .nav-step.active .n{background:var(--accent);color:#fff;}
  .nav-step.done .n{background:#e3f3ea;color:var(--good);}
  .side-sentence{margin:14px 20px 0;padding-top:12px;border-top:1px dashed var(--border);}
  .side-sentence .lab{font-size:11px;color:var(--text-muted);margin-bottom:7px;}
  .side-sentence .w{display:inline-block;background:var(--accent-light);color:var(--accent-hover);border-radius:6px;
    padding:3px 9px;margin:0 4px 6px 0;font-size:12px;font-weight:700;}

  /* 主区域 */
  #main{margin-left:250px;padding:34px 40px 80px;max-width:1280px;width:100%;}
  h1{font-size:1.8rem;font-weight:800;color:var(--heading);margin-bottom:5px;}
  h1 span{color:var(--accent);}
  .subtitle{color:var(--text-muted);font-size:13.5px;margin-bottom:20px;}
  .subtitle b{color:var(--accent);}

  .progress-wrap{background:var(--border);height:6px;border-radius:6px;overflow:hidden;margin-bottom:16px;}
  .progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),#7d93f9);width:0;transition:width .4s ease;}

  .controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:18px;}
  button{background:#fff;color:var(--text);border:1px solid var(--border);padding:9px 16px;border-radius:10px;
    font-size:13.5px;cursor:pointer;font-weight:600;transition:.2s;box-shadow:var(--shadow);}
  button:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
  button.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
  button.primary:hover:not(:disabled){background:var(--accent-hover);color:#fff;}
  button.play{background:var(--good);color:#fff;border-color:var(--good);}
  button.play:hover:not(:disabled){background:#235a40;color:#fff;}
  button:disabled{opacity:.4;cursor:not-allowed;}
  .counter{color:var(--text-muted);font-size:13px;font-variant-numeric:tabular-nums;}

  /* 网格：左图 右讲解 */
  .grid{display:grid;grid-template-columns:1.45fr .85fr;gap:20px;align-items:start;}
  .panel{background:var(--content-bg);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);}
  .svg-panel{padding:14px;overflow:auto;}
  .svg-panel svg{width:100%;min-width:680px;display:block;}

  .aside{display:flex;flex-direction:column;gap:16px;}
  .card{padding:18px 20px;}
  .card .sec-num{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:8px;
    border:2px solid var(--accent);color:var(--accent);font-weight:900;font-size:14px;font-variant-numeric:tabular-nums;margin-right:8px;vertical-align:middle;}
  .card h2{display:inline;font-size:1.15rem;font-weight:700;color:var(--heading);vertical-align:middle;}
  .card .desc{font-size:14px;color:var(--text);margin-top:12px;}
  .card .desc b{color:var(--heading);} .card .desc .hl{color:var(--accent);font-weight:700;}
  .callout{background:var(--callout-bg);border-left:4px solid var(--accent);border-radius:0 8px 8px 0;
    padding:12px 15px;margin-top:14px;font-size:13px;color:var(--text);}
  .callout.good{background:var(--good-light);border-left-color:var(--good);}
  .callout strong{color:var(--accent);} .callout.good strong{color:var(--good);}

  .card h3{font-size:13px;font-weight:700;color:var(--heading);margin-bottom:10px;}
  .lab{font-size:11.5px;color:var(--text-muted);margin:8px 0 6px;}
  .toks{display:flex;flex-wrap:wrap;gap:7px;min-height:34px;}
  .tok{display:inline-flex;padding:5px 11px;border-radius:8px;border:1px solid var(--border);font-weight:600;
    font-size:13px;background:#f4f6fb;color:var(--text);animation:fade .4s both;}
  .tok.en{background:#f1f4fb;border-color:#d8e0f5;color:#3a4a66;}
  .tok.fr{background:var(--dec-light);border-color:#f4c89a;color:#b4600f;}
  .tok.fr-now{background:var(--dec);border-color:#d97a1f;color:#fff;animation:pulse 1.1s ease-in-out infinite;}
  .tok.fr-done{background:var(--good);border-color:#235a40;color:#fff;}
  .tok.att-on{background:var(--accent);border-color:var(--accent-hover);color:#fff;animation:pulse 1.1s ease-in-out infinite;}
  .tok.att-off{background:#f4f6fb;border-color:var(--border);color:#aeb8c8;}
  @keyframes fade{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
  @keyframes pulse{50%{transform:scale(1.07)}}

  /* 词向量柱状图 */
  .vec-wrap{display:flex;gap:14px;flex-wrap:wrap;margin-top:6px;}
  .vec-col{text-align:center;}
  .vec-col .vw{font-size:12px;font-weight:700;color:var(--heading);margin-bottom:4px;}
  .vecbar{display:flex;gap:2px;height:30px;align-items:flex-end;justify-content:center;}
  .vecbar i{width:5px;background:linear-gradient(180deg,#7d93f9,var(--accent));border-radius:2px;display:block;animation:grow .6s both;}
  .vecbar.pos i{background:linear-gradient(180deg,#f7b06b,var(--dec));}
  .vplus{font-size:13px;color:var(--text-muted);margin:3px 0;}
  @keyframes grow{from{height:2px;opacity:.2}to{opacity:1}}

  /* SVG 节点状态 */
  .node{transition:all .35s ease;opacity:.38;}
  .node.active{opacity:1;}
  .node.done{opacity:1;}
  .nodeRect{transition:all .35s ease;}
  .node.active .nodeRect{filter:url(#glow);}
  .wire{fill:none;stroke:#5a6b85;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
  .frame{fill:none;stroke:#d3d9e6;stroke-width:4;}
  .resid{fill:none;stroke:#aab4c8;stroke-width:1.6;stroke-dasharray:4 4;}
  .lbl{font-size:14px;fill:#1a2540;text-anchor:middle;dominant-baseline:middle;}
  .sm{font-size:12px;fill:#3a4a66;text-anchor:middle;dominant-baseline:middle;}
  .tiny{font-size:10.5px;text-anchor:middle;dominant-baseline:middle;}
  .attnLine{stroke:var(--accent);stroke-width:3;opacity:0;transition:opacity .4s;}
  .attnLine.on{opacity:1;animation:dash 1s linear infinite;stroke-dasharray:8 7;}
  .loop{stroke:var(--good);stroke-width:3;fill:none;opacity:0;transition:opacity .45s;}
  .loop.on{opacity:1;animation:dash 1.1s linear infinite;stroke-dasharray:9 7;}
  @keyframes dash{to{stroke-dashoffset:-32}}

  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

  @media (max-width:1080px){.grid{grid-template-columns:1fr;}}
  @media (max-width:820px){#sidebar{display:none;}#main{margin-left:0;padding:22px 16px 60px;}}
</style>
</head>
<body>

<nav id="sidebar">
  <div class="logo">TRANSFORMER 动画<small>13 步看懂模型如何翻译</small></div>
  <div id="navList"></div>
  <div class="side-sentence">
    <div class="lab">英文输入：</div>
    <span class="w">You</span><span class="w">like</span><span class="w">this</span><span class="w">course</span>
    <div class="lab" style="margin-top:6px;">法语输出 🇫🇷：</div>
    <span class="w" style="background:var(--dec-light);color:#b4600f;">Vous</span><span class="w" style="background:var(--dec-light);color:#b4600f;">aimez</span><span class="w" style="background:var(--dec-light);color:#b4600f;">ce</span><span class="w" style="background:var(--dec-light);color:#b4600f;">cours</span>
  </div>
</nav>

<main id="main">
  <h1>Transformer <span>工作原理 · 动画演示</span></h1>
  <p class="subtitle">用 <b>"You like this course" → "Vous aimez ce cours"</b> 演示编码器–解码器翻译全过程 · 小白也能看懂</p>

  <div class="progress-wrap"><div class="progress-bar" id="progress"></div></div>
  <div class="controls">
    <button id="prev">← 上一步</button>
    <button id="play" class="play">▶ 自动播放</button>
    <button id="next" class="primary">下一步 →</button>
    <button id="reset">↺ 重置</button>
    <span class="counter" id="counter">0 / 12</span>
  </div>

  <div class="grid">
    <!-- 架构图 -->
    <div class="panel svg-panel">
      <svg viewBox="140 50 800 692">
        <defs>
          <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
            <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#4f6ef7" flood-opacity=".7"/>
          </filter>
          <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#5a6b85"/></marker>
          <marker id="arrowI" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#4f6ef7"/></marker>
          <marker id="arrowG" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#2d6a4f"/></marker>
        </defs>

        <text x="285" y="312" class="sm" fill="#4f6ef7" font-weight="bold">ENCODER · 读懂英文</text>
        <text x="470" y="150" class="sm" fill="#f5933a" font-weight="bold">DECODER · 写出法语</text>

        <!-- 编码器输入 -->
        <text x="285" y="715" class="lbl">Inputs（英文）</text>
        <g id="inputEmbedding" class="node"><rect class="nodeRect" x="210" y="620" width="150" height="44" rx="10" fill="#eef1fe" stroke="#4f6ef7"/><text x="285" y="642" class="sm">Input embedding</text></g>
        <text x="345" y="595" class="lbl">＋</text><text x="305" y="595" class="lbl" fill="#f5933a">∿</text>
        <text x="285" y="576" class="tiny" fill="#7f8c9a">＋ 位置编码</text>
        <path d="M285 620 L285 600" class="wire" marker-end="url(#arrow)"/>

        <!-- 编码器主体 -->
        <rect x="170" y="330" width="230" height="232" rx="26" class="frame"/>
        <text x="385" y="348" class="tiny" fill="#7f8c9a" transform="rotate(90 385 348)">× N 层</text>
        <g id="encAtt" class="node"><rect class="nodeRect" x="225" y="495" width="120" height="54" rx="9" fill="#eef1fe" stroke="#4f6ef7"/><text x="285" y="514" class="sm">Multi-head</text><text x="285" y="532" class="sm">attention</text></g>
        <g id="encNorm1" class="node"><rect class="nodeRect" x="225" y="440" width="120" height="34" rx="9" fill="#eef1fe" stroke="#4f6ef7"/><text x="285" y="457" class="sm">Add &amp; norm</text></g>
        <g id="encFF" class="node"><rect class="nodeRect" x="225" y="390" width="120" height="34" rx="9" fill="#eaf7f0" stroke="#2d6a4f"/><text x="285" y="407" class="sm">Feed forward</text></g>
        <g id="encNorm2" class="node"><rect class="nodeRect" x="225" y="340" width="120" height="34" rx="9" fill="#eef1fe" stroke="#4f6ef7"/><text x="285" y="357" class="sm">Add &amp; norm</text></g>
        <path d="M285 576 L285 549" class="wire" marker-end="url(#arrow)"/>
        <path d="M285 495 L285 476" class="wire" marker-end="url(#arrow)"/>
        <path d="M285 440 L285 426" class="wire" marker-end="url(#arrow)"/>
        <path d="M285 390 L285 376" class="wire" marker-end="url(#arrow)"/>
        <path d="M210 522 C190 522,190 457,225 457" class="resid"/>
        <path d="M210 407 C190 407,190 357,225 357" class="resid"/>

        <!-- 解码器输入 -->
        <text x="675" y="715" class="lbl">Outputs（已生成的词）</text>
        <text x="675" y="732" class="tiny" fill="#7f8c9a">右移一位 shifted right</text>
        <g id="outputEmbedding" class="node"><rect class="nodeRect" x="595" y="620" width="160" height="44" rx="10" fill="#fdf0e3" stroke="#f5933a"/><text x="675" y="642" class="sm">Output embedding</text></g>
        <text x="615" y="595" class="lbl">＋</text><text x="655" y="595" class="lbl" fill="#f5933a">∿</text>
        <text x="675" y="576" class="tiny" fill="#7f8c9a">＋ 位置编码</text>
        <path d="M675 620 L675 600" class="wire" marker-end="url(#arrow)"/>

        <!-- 解码器主体 -->
        <rect x="555" y="185" width="230" height="377" rx="26" class="frame"/>
        <text x="770" y="205" class="tiny" fill="#7f8c9a" transform="rotate(90 770 205)">× N 层</text>
        <g id="decMasked" class="node"><rect class="nodeRect" x="615" y="495" width="120" height="54" rx="9" fill="#fdf0e3" stroke="#f5933a"/><text x="675" y="512" class="sm">Masked multi-</text><text x="675" y="529" class="sm">head attention</text></g>
        <g id="decNorm1" class="node"><rect class="nodeRect" x="615" y="440" width="120" height="34" rx="9" fill="#fdf0e3" stroke="#f5933a"/><text x="675" y="457" class="sm">Add &amp; norm</text></g>
        <g id="decCross" class="node"><rect class="nodeRect" x="615" y="360" width="120" height="54" rx="9" fill="#fdf0e3" stroke="#f5933a"/><text x="675" y="379" class="sm">Multi-head</text><text x="675" y="397" class="sm">attention</text></g>
        <g id="decNorm2" class="node"><rect class="nodeRect" x="615" y="308" width="120" height="34" rx="9" fill="#fdf0e3" stroke="#f5933a"/><text x="675" y="325" class="sm">Add &amp; norm</text></g>
        <g id="decFF" class="node"><rect class="nodeRect" x="615" y="258" width="120" height="34" rx="9" fill="#eaf7f0" stroke="#2d6a4f"/><text x="675" y="275" class="sm">Feed forward</text></g>
        <g id="decNorm3" class="node"><rect class="nodeRect" x="615" y="208" width="120" height="34" rx="9" fill="#fdf0e3" stroke="#f5933a"/><text x="675" y="225" class="sm">Add &amp; norm</text></g>
        <path d="M675 576 L675 549" class="wire" marker-end="url(#arrow)"/>
        <path d="M675 495 L675 476" class="wire" marker-end="url(#arrow)"/>
        <path d="M675 440 L675 416" class="wire" marker-end="url(#arrow)"/>
        <path d="M675 360 L675 344" class="wire" marker-end="url(#arrow)"/>
        <path d="M675 308 L675 294" class="wire" marker-end="url(#arrow)"/>
        <path d="M675 258 L675 244" class="wire" marker-end="url(#arrow)"/>
        <path d="M600 522 C580 522,580 457,615 457" class="resid"/>
        <path d="M600 387 C580 387,580 325,615 325" class="resid"/>
        <path d="M600 275 C580 275,580 225,615 225" class="resid"/>

        <!-- 输出头 -->
        <g id="linear" class="node"><rect class="nodeRect" x="615" y="150" width="120" height="32" rx="9" fill="#fff7ed" stroke="#fbbf6b"/><text x="675" y="166" class="sm">Linear</text></g>
        <g id="softmax" class="node"><rect class="nodeRect" x="615" y="105" width="120" height="32" rx="9" fill="#fff7ed" stroke="#f59e3a"/><text x="675" y="121" class="sm">Softmax</text></g>
        <text x="675" y="74" class="sm" font-weight="bold">Output probabilities</text>
        <path d="M675 208 L675 182" class="wire" marker-end="url(#arrow)"/>
        <path d="M675 150 L675 137" class="wire" marker-end="url(#arrow)"/>
        <path d="M675 105 L675 86" class="wire" marker-end="url(#arrow)"/>

        <!-- 交叉注意力流 -->
        <path id="crossFlow" d="M345 357 C470 357,470 387,615 387" class="attnLine" marker-end="url(#arrowI)"/>
        <text id="crossLbl" x="480" y="345" class="tiny" fill="#4f6ef7" opacity="0" font-weight="bold">K · V（来自编码器）</text>

        <!-- 自回归循环 -->
        <path id="loopFlow" d="M745 121 C880 121,880 642,755 642" class="loop" marker-end="url(#arrowG)"/>
        <text id="loopLbl" x="905" y="380" class="tiny" fill="#2d6a4f" opacity="0" font-weight="bold" transform="rotate(90 905 380)">把刚生成的词放回输入，循环生成下一个</text>
      </svg>
    </div>

    <!-- 讲解面板 -->
    <div class="aside">
      <div class="panel card">
        <span class="sec-num" id="secnum">00</span><h2 id="title">标题</h2>
        <div class="desc" id="desc">描述</div>
        <div class="callout" id="note">类比</div>
        <div id="vecBox" style="display:none;margin-top:14px;"></div>
      </div>

      <div class="panel card">
        <h3>📝 当前句子</h3>
        <div class="lab">英文输入</div>
        <div class="toks" id="enToks"></div>
        <div class="lab" style="margin-top:12px;">法语输出（逐词生成）</div>
        <div class="toks" id="frToks"></div>
      </div>

      <div class="panel card">
        <h3>🎯 注意力抓重点</h3>
        <p class="lab" id="attHint" style="margin-top:0;">还没开始生成。</p>
        <div class="toks" id="attToks"></div>
      </div>
    </div>
  </div>

  <p class="subtitle" style="margin-top:26px;">
    参考：<a href="https://huggingface.co/learn/llm-course/zh-CN/chapter1/4" target="_blank" style="color:var(--accent)">Hugging Face LLM 课程 · 第 1 章第 4 节</a>
  </p>
</main>

<script>
const EN=["You","like","this","course"], FR=["Vous","aimez","ce","cours"];
const att={
  Vous:{f:["You"], h:"生成 Vous：主要看主语 You。"},
  aimez:{f:["You","like"], h:"生成 aimez：看 like（喜欢），还要看 You——法语动词形式要与主语配合。"},
  ce:{f:["this","course"], h:"生成 ce：看 this，也看 course——“这”要与后面名词的性数匹配。"},
  cours:{f:["course"], h:"生成 cours：主要看 course。"}
};
const allIds=["inputEmbedding","encAtt","encNorm1","encFF","encNorm2","outputEmbedding","decMasked","decNorm1","decCross","decNorm2","decFF","decNorm3","linear","softmax"];
const encIds=["inputEmbedding","encAtt","encNorm1","encFF","encNorm2"];

/* 词向量柱状图 */
function vbar(n,cls){let h="";for(let i=0;i<n;i++){const v=15+Math.round(Math.random()*85);h+='<i style="height:'+v+'%;animation-delay:'+(i*0.04)+'s"></i>';}return '<div class="vecbar '+(cls||'')+'">'+h+'</div>';}
function vecView(mode){
  let cols=EN.map(function(w){
    if(mode==="emb") return '<div class="vec-col"><div class="vw">'+w+'</div>'+vbar(7)+'</div>';
    return '<div class="vec-col"><div class="vw">'+w+'</div>'+vbar(7)+'<div class="vplus">＋</div>'+vbar(7,'pos')+'</div>';
  }).join("");
  let cap = mode==="emb" ? '每个词 → 一串数字（向量）。含义相近，向量也相近。'
                         : '蓝=含义向量，橙=位置向量，相加 = 既懂含义又懂顺序。';
  return '<div class="lab" style="margin-top:0">'+cap+'</div><div class="vec-wrap">'+cols+'</div>';
}

/* 步骤数据 */
const steps=[
 {t:"先看懂这张图", x:'左边蓝色是<b class="hl">编码器 Encoder</b>，像阅读理解老师，一次性读懂整句英文；右边橙色是<b class="hl">解码器 Decoder</b>，像翻译写作者，一个词一个词写出法语。数据从下往上流动。',
  a:'💡 <strong>一句话：</strong>编码器负责“读懂”，解码器负责“写出”。两者中间靠注意力连接。', on:[]},
 {t:"把文字变成数字", x:'英文先被拆成词块(token)，经过 <b class="hl">Input embedding</b> 变成数字向量；再加上<b>位置编码</b>，告诉模型每个词在第几位（模型本身不知道先后顺序）。',
  a:'💡 <strong>类比：</strong>向量像每个词的“性格画像”，位置编码像“排队号码牌”。', on:["inputEmbedding"], vec:"pos"},
 {t:"编码器自注意力", x:'<b class="hl">Multi-head attention</b> 让每个英文词去观察句子里所有其他词。“多头”=多个角度同时看：有的头盯语法，有的盯词义，有的盯远距离关系。',
  a:'💡 <strong>类比：</strong>读句子时大脑自动联系上下文——看到“它”会回头找指代对象。', on:["inputEmbedding","encAtt"]},
 {t:"残差 + 归一化", x:'<b class="hl">Add &amp; norm</b>：虚线旁路(Add)把加工前的信息直接加回来，避免丢失；norm 把数值整理稳定，让训练更顺。每个子层后面都有这一步。',
  a:'💡 <strong>类比：</strong>“保留原稿 + 校对润色”，确保改写不跑偏。', on:["encAtt","encNorm1"]},
 {t:"编码完成，得到“理解包”", x:'经过 <b class="hl">Feed forward</b> 逐词再加工，编码器顶部输出一份“读懂后的英文信息”。这份信息接下来会一直供解码器查阅。',
  a:'💡 <strong>类比：</strong>开会交流(注意力) → 会后各自消化(前馈)，重复 N 层，理解越来越深。', on:["encFF","encNorm2"]},
 {t:"解码器准备开写", x:'解码端输入“已经生成的词”，开始只有一个起始符。注意：输入是目标句<b>右移一位(shifted right)</b>——用“前面的词”去预测“下一个词”。',
  a:'💡 <strong>类比：</strong>翻译时一边写一边参考自己已经写出的内容。', on:["outputEmbedding"]},
 {t:"生成 Vous（掩码注意力）", x:'<b class="hl">Masked multi-head attention</b> 只能看已写出的词，看不到未来——像考试遮住后面的答案。此刻只有起始符，模型据此准备写第 1 个词。',
  a:'💡 <strong>掩码是什么？</strong>预测时不能“偷看答案”，只能看已生成的词，保证学会真正的“预测”。', on:["outputEmbedding","decMasked","decNorm1"], word:0},
 {t:"交叉注意力查阅原文", x:'关键一步！解码器的第二个注意力层：Query 来自解码器，<b class="hl">Key/Value 来自编码器</b>(蓝色连线)。它在问：“现在要写法语词，英文原句哪些词最重要？”于是定下 Vous，对应 You。',
  a:'💡 <strong>类比：</strong>翻译时不停回头看原文，找当前最该翻译的那个词。', on:["decCross","decNorm2"], word:0, cross:true},
 {t:"Linear + Softmax 选词", x:'输出经 <b class="hl">Linear + Softmax</b>，算出词表里每个词的概率，挑概率最高的——得到 <b>Vous</b>。',
  a:'💡 <strong>类比：</strong>Softmax 像投票：给每个候选词打分，选得票最高的。', on:["linear","softmax"], word:0, cross:true},
 {t:"自回归：把新词放回去", x:'核心循环！刚生成的 Vous 被<b>放回解码器输入</b>，模型再走一遍流程，生成下一个词 <b>aimez</b>。生成它时注意力重点看 like 和 You。',
  a:'💡 <strong>类比：</strong>写一个字 → 回读已写的 → 再写下一个字，循环往复。', on:["outputEmbedding","decMasked","decCross","linear","softmax"], word:1, cross:true, loop:true},
 {t:"继续循环生成 ce", x:'把 aimez 也放回输入，再生成 <b>ce</b>。此时注意力同时看 this 和 course。每生成一个词就循环一次，这就是<b class="hl">自回归</b>。',
  a:'💡 <strong>提示：</strong>“ce”要和后面名词的性数匹配，所以要看 course。', on:["decMasked","decCross","softmax"], word:2, cross:true, loop:true},
 {t:"生成 cours，翻译完成", x:'再循环一次生成 <b>cours</b>（看 course），随后模型输出结束符，停止。最终译文：<b>Vous aimez ce cours</b>。',
  a:'🎉 <strong>全流程回顾：</strong>分词→嵌入→位置编码→编码器(自注意力+前馈×N)→解码器(掩码+交叉注意力+前馈)→Linear/Softmax→自回归循环逐词生成。', on:["decMasked","decCross","softmax"], word:3, cross:true, loop:true, finish:true}
];

let cur=0, timer=null;
const $=function(id){return document.getElementById(id);};

/* 侧边导航 */
const navList=$("navList");
steps.forEach(function(s,i){
  const it=document.createElement("div");
  it.className="nav-step";
  it.innerHTML='<span class="n">'+i+'</span><span>'+s.t+'</span>';
  it.onclick=function(){stop();cur=i;render();};
  navList.appendChild(it);
});

/* token chip */
function chip(w,cls){return '<span class="tok '+cls+'">'+w+'</span>';}

function renderTokens(word){
  $("enToks").innerHTML = EN.map(function(w){return chip(w,"en");}).join("");
  let n = (word==null)?-1:word;
  let fr="";
  for(let i=0;i<=n;i++) fr += chip(FR[i], i===n?"fr-now":"fr");
  $("frToks").innerHTML = fr || '<span class="lab" style="margin:0">（尚未生成）</span>';
  if(word!=null){
    const info=att[FR[word]];
    $("attHint").textContent=info.h;
    $("attToks").innerHTML = EN.map(function(w){return chip(w, info.f.indexOf(w)>=0?"att-on":"att-off");}).join("");
  }else{
    $("attHint").textContent="还没开始生成。";
    $("attToks").innerHTML="";
  }
}

function render(){
  const s=steps[cur];
  $("secnum").textContent=String(cur).padStart(2,"0");
  $("title").textContent=s.t;
  $("desc").innerHTML=s.x;
  const note=$("note"); note.innerHTML=s.a; note.className=s.finish?"callout good":"callout";
  $("counter").textContent=cur+" / "+(steps.length-1);
  $("progress").style.width=(cur/(steps.length-1)*100)+"%";

  // 词向量面板
  if(s.vec){ $("vecBox").style.display="block"; $("vecBox").innerHTML=vecView(s.vec); }
  else { $("vecBox").style.display="none"; }

  // 导航高亮
  const navs=navList.children;
  for(let i=0;i<navs.length;i++){
    navs[i].classList.toggle("active",i===cur);
    navs[i].classList.toggle("done",i<cur);
  }
  $("prev").disabled=(cur===0);
  $("next").disabled=(cur===steps.length-1);

  // SVG 节点
  allIds.forEach(function(id){$(id).classList.remove("active","done");});
  if((s.on||[]).length===0){
    // 总览：全部完整显示，不做高亮淡化
    allIds.forEach(function(id){$(id).classList.add("done");});
  }else{
    (s.on||[]).forEach(function(id){$(id).classList.add("active");});
    if(cur>=4) encIds.forEach(function(id){ if((s.on||[]).indexOf(id)<0) $(id).classList.add("done"); });
  }

  $("crossFlow").classList.toggle("on",!!s.cross);
  $("crossLbl").setAttribute("opacity",s.cross?"1":"0");
  $("loopFlow").classList.toggle("on",!!s.loop);
  $("loopLbl").setAttribute("opacity",s.loop?"1":"0");

  renderTokens(s.word);
  if(s.finish){ $("frToks").innerHTML = FR.map(function(w){return chip(w,"fr-done");}).join(""); }
}

function stop(){ if(timer){clearInterval(timer);timer=null;$("play").textContent="▶ 自动播放";} }
$("next").onclick=function(){ if(cur<steps.length-1){stop();cur++;render();} };
$("prev").onclick=function(){ if(cur>0){stop();cur--;render();} };
$("reset").onclick=function(){ stop();cur=0;render(); };
$("play").onclick=function(){
  if(timer){stop();return;}
  $("play").textContent="⏸ 暂停";
  timer=setInterval(function(){ if(cur<steps.length-1){cur++;render();} else stop(); },3400);
};
document.addEventListener("keydown",function(e){
  if(e.key==="ArrowRight"){stop();if(cur<steps.length-1){cur++;render();}}
  if(e.key==="ArrowLeft"){stop();if(cur>0){cur--;render();}}
});

render();
</script>
</body>
</html>
